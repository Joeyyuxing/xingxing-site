<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#050508">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="星星的小破站 - 在浩瀚宇宙里，留一颗属于自己的星">
<title>星星的小破站</title>
<script src="https://static.cloudbase.net/cloudbase-js-sdk/2.17.3/cloudbase.full.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--bg2:#0a0a0d;--bg3:#0f0f12;--card:#0a0a0e;--text:#e6e6f0;--text2:#c8c8d8;--dim:#8a8a9a;--muted:#555568;--faint:#333342;--accent:#8b7cf7;--accent2:#a99dfc;--accent-g:rgba(139,124,247,0.2);--like:#f0475a;--save:#e8c34a;--bd:rgba(255,255,255,0.05);--bd2:rgba(255,255,255,0.08);--bd3:rgba(255,255,255,0.12);--r:14px;--rs:8px;--ease:cubic-bezier(0.16,1,0.3,1)}
html{scroll-behavior:smooth}
body{font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Helvetica Neue','PingFang SC',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;overflow-x:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;padding-top:env(safe-area-inset-top,0)}
::selection{background:var(--accent-g)}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

/* INTRO */
.intro{position:fixed;inset:0;z-index:9999;background:#000;overflow:hidden;transition:opacity 1.5s ease}
.intro.out{opacity:0;pointer-events:none}.intro.gone{display:none}
#introC{width:100%;height:100%}
.intro-txt{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0);font-size:clamp(.85rem,2.5vw,1.2rem);letter-spacing:.5em;font-weight:200;transition:all 1.5s ease;white-space:nowrap;text-shadow:0 0 20px rgba(120,160,255,.3)}
.intro-txt.on{color:rgba(255,255,255,.6);letter-spacing:.35em}
.intro-txt.off{color:rgba(255,255,255,0);letter-spacing:.15em}

/* SOLAR SYSTEM */
#solar{position:fixed;inset:0;z-index:50;background:#050508;transition:opacity .8s}
#solar.off{opacity:0;pointer-events:none;z-index:-1}
#solarC{width:100%;height:100%}
.pnav{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);z-index:55;display:flex;gap:.25rem;padding:.35rem .5rem;background:rgba(10,10,20,.8);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.06);border-radius:14px}
.pnav.hide{display:none}
.pnav-btn{display:flex;flex-direction:column;align-items:center;gap:.15rem;padding:.3rem .45rem;border-radius:8px;border:1.5px solid transparent;background:none;cursor:pointer;transition:all .3s var(--ease);min-width:36px}
.pnav-btn:hover{background:rgba(255,255,255,.06);transform:scale(1.08)}
.pnav-btn .pnav-e{font-size:.85rem;line-height:1}
.pnav-btn .pnav-n{font-size:.48rem;color:rgba(255,255,255,.35);white-space:nowrap;transition:color .3s}
.pnav-btn:hover .pnav-n{color:rgba(255,255,255,.7)}
.pi{position:fixed;z-index:60;pointer-events:none;opacity:0;transition:all .3s var(--ease);transform:translateY(6px)}
.pi.on{opacity:1;transform:translateY(0)}
.pi-box{background:rgba(10,10,20,.92);backdrop-filter:blur(16px);border:1px solid var(--bd2);border-radius:10px;padding:.65rem 1rem;text-align:center}
.pi-n{font-size:.95rem;color:var(--text);margin-bottom:.15rem}.pi-d{font-size:.62rem;color:var(--dim)}.pi-h{font-size:.55rem;color:var(--accent);margin-top:.3rem;letter-spacing:.06em}

/* BACK BTN — inside nav */
.nav-l{display:flex;align-items:center;gap:.6rem}
.back-btn{display:none;align-items:center;gap:.3rem;padding:.3rem .7rem;background:rgba(255,255,255,.04);backdrop-filter:blur(16px);border:1px solid var(--bd2);border-radius:100px;color:var(--text2);font-size:.68rem;cursor:pointer;transition:all .3s var(--ease);font-family:inherit;white-space:nowrap}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.back-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.5}

/* PLANET TRANSITION */
.ptrans{position:fixed;inset:0;z-index:200;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .5s}
.ptrans.on{opacity:1}
.ptrans .ring{width:0;height:0;border-radius:50%;transition:all 1s var(--ease);opacity:.12}
.ptrans.on .ring{width:300vmax;height:300vmax;opacity:.1}

/* EARTH SUB-THEMES */
.esub{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);z-index:95;display:none;gap:.25rem;padding:.35rem;background:rgba(10,10,14,.75);backdrop-filter:blur(16px);border:1px solid var(--bd2);border-radius:14px}
.esub.on{display:flex}
.esub button{width:32px;height:32px;border-radius:8px;border:1.5px solid transparent;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .3s var(--ease);position:relative}
.esub button:hover{background:rgba(255,255,255,.05);transform:scale(1.1)}
.esub button.a{border-color:var(--accent);background:rgba(139,124,247,.1)}
.esub button span{position:absolute;bottom:calc(100% + 5px);white-space:nowrap;font-size:.55rem;color:var(--text2);background:rgba(10,10,14,.95);border:1px solid var(--bd2);border-radius:5px;padding:.1rem .4rem;opacity:0;pointer-events:none;transition:all .2s}
.esub button:hover span{opacity:1}

#stars{position:fixed;inset:0;z-index:0;pointer-events:none}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1rem 1.5rem;display:none;justify-content:space-between;align-items:center;transition:all .5s var(--ease)}
.nav.on{display:flex}.nav.scrolled{padding:.8rem 1.5rem;background:rgba(6,6,17,.88);backdrop-filter:blur(24px);border-bottom:1px solid var(--bd)}
.nav-logo{font-size:.8rem;letter-spacing:.1em;font-weight:500;display:flex;align-items:center;gap:.4rem;color:var(--text2)}
.logo-dot{width:5px;height:5px;border-radius:50%;background:#c8d0e0;box-shadow:0 0 6px rgba(200,208,224,.25);animation:glow 4s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:.6}50%{opacity:1}}
.logo-hl{background:linear-gradient(135deg,#fff,#c8d0e0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:600}
.nav-r{display:flex;gap:.5rem;align-items:center}
.nbtn{background:none;border:1px solid var(--bd2);color:var(--text2);padding:.35rem .9rem;border-radius:100px;font-size:.72rem;cursor:pointer;transition:all .3s var(--ease)}
.nbtn:hover{border-color:var(--accent);color:var(--accent)}
.nbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.nav-pl{display:flex;align-items:center;gap:.35rem;font-size:.7rem;color:var(--dim);padding:.3rem .7rem;border-radius:100px;border:1px solid var(--bd);cursor:pointer;transition:all .3s var(--ease)}
.nav-pl:hover{border-color:var(--accent);color:var(--accent2)}

/* HERO */
.hero{position:relative;height:100vh;display:none;flex-direction:column;justify-content:center;align-items:center;z-index:1}
.hero.on{display:flex}
.h-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.25rem .8rem;border-radius:100px;border:1px solid var(--bd2);font-size:.62rem;letter-spacing:.1em;color:var(--dim);margin-bottom:2rem;opacity:0;animation:fu .8s var(--ease) .3s forwards;transform:translateY(20px)}
.h-badge .bd{width:5px;height:5px;border-radius:50%;background:#4ade80;animation:glow 3s ease infinite}
.h-title{font-size:clamp(2.5rem,10vw,7rem);font-weight:100;letter-spacing:-.04em;line-height:1;opacity:0;animation:fu 1s var(--ease) .5s forwards;transform:translateY(20px)}
.h-title .hl{background:linear-gradient(135deg,#fff 0%,#c8d0e0 40%,#dde4ff 70%,#fff 100%);background-size:250% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:250;animation:hsh 8s ease-in-out infinite}
@keyframes hsh{0%,100%{background-position:0%}50%{background-position:100%}}
.h-title .rest{color:rgba(255,255,255,.7);font-weight:100}
.h-desc{font-size:clamp(.8rem,1.5vw,.95rem);color:var(--dim);margin-top:1.2rem;letter-spacing:.04em;opacity:0;animation:fu 1s var(--ease) .7s forwards;transform:translateY(20px)}
.h-cta{margin-top:2rem;display:flex;gap:.7rem;justify-content:center;opacity:0;animation:fu 1s var(--ease) 1s forwards;transform:translateY(20px)}
.cb{padding:.55rem 1.4rem;border-radius:100px;font-size:.8rem;cursor:pointer;transition:all .3s var(--ease);font-family:inherit}
.cb-p{background:var(--accent);border:none;color:#fff;font-weight:500}.cb-p:hover{box-shadow:0 4px 24px var(--accent-g);transform:translateY(-2px)}
.cb-g{background:none;border:1px solid var(--bd3);color:var(--text2)}.cb-g:hover{border-color:var(--accent);color:var(--accent)}
.h-scr{position:absolute;bottom:2rem;display:flex;flex-direction:column;align-items:center;gap:.3rem;opacity:0;animation:fu 1s var(--ease) 1.3s forwards;transform:translateY(20px)}
.h-scr span{font-size:.55rem;letter-spacing:.12em;color:var(--faint);text-transform:uppercase}
.scr-box{width:16px;height:26px;border:1px solid var(--faint);border-radius:8px;position:relative}
.scr-d{width:2px;height:5px;background:var(--dim);border-radius:2px;position:absolute;top:5px;left:50%;transform:translateX(-50%);animation:sd 2.5s ease-in-out infinite}
@keyframes sd{0%{opacity:1;top:5px}100%{opacity:0;top:16px}}
@keyframes fu{to{opacity:1;transform:translateY(0)}}

/* QUOTE */
.quote{position:relative;z-index:1;max-width:620px;margin:0 auto;padding:1.2rem 1rem 0;display:none}.quote.on{display:block}
.qcard{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:1.3rem 1.5rem;position:relative;overflow:hidden;transition:all .4s var(--ease)}
.qcard:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.3)}
.qmark{position:absolute;top:-.5rem;left:1rem;font-size:3.5rem;color:rgba(139,124,247,.08);font-family:Georgia,serif;pointer-events:none}
.qtxt{font-size:.88rem;color:var(--text2);line-height:1.8;font-style:italic;padding-left:.5rem;border-left:2px solid var(--accent);margin-left:.2rem}
.qsrc{margin-top:.6rem;font-size:.65rem;color:var(--faint);text-align:right}

/* MAIN */
.main{position:relative;z-index:1;max-width:620px;margin:0 auto;padding:0 1rem 7rem;display:none}.main.on{display:block}
.sec-h{padding:4rem 0 1.2rem;margin-bottom:2rem;display:flex;justify-content:space-between;align-items:baseline}
.sec-t{font-size:1.15rem;font-weight:300;color:var(--text2)}.sec-c{font-size:.68rem;color:var(--faint);font-variant-numeric:tabular-nums}
.tl{position:relative;padding-left:26px}.tl::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,var(--bd2) 0%,var(--bd) 80%,transparent 100%)}
.post{position:relative;margin-bottom:1.8rem}
.post-dot{position:absolute;left:-21px;top:20px;width:8px;height:8px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--accent);z-index:2;transition:all .4s var(--ease)}
.post:hover .post-dot{background:var(--accent);box-shadow:0 0 8px var(--accent-g)}
.post-date{font-size:.64rem;color:var(--faint);margin-bottom:.35rem;font-variant-numeric:tabular-nums}
.post-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;transition:all .4s var(--ease)}
.post:hover .post-card{border-color:var(--bd2);transform:translateY(-2px);box-shadow:0 10px 35px rgba(0,0,0,.35)}
.pm{position:relative;overflow:hidden;cursor:pointer;background:var(--bg2)}
.pm img,.pm video{width:100%;display:block;object-fit:cover;max-height:380px;transition:transform .6s var(--ease)}
.post:hover .pm img,.post:hover .pm video{transform:scale(1.02)}
.pm .play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,.45);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.15);transition:all .3s var(--ease)}
.post:hover .play{background:rgba(139,124,247,.35)}.play svg{width:16px;height:16px;fill:white;margin-left:2px}
.mcnt{position:absolute;top:.5rem;right:.5rem;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);padding:.12rem .5rem;border-radius:100px;font-size:.58rem;color:rgba(255,255,255,.85)}
.gal{display:grid;gap:2px;cursor:pointer;background:var(--bg2)}
.gal.g2{grid-template-columns:1fr 1fr}.gal.g3{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}.gal.g3 .gi:first-child{grid-row:span 2}.gal.g4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}.gal.g5{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr}.gal.g5 .gi:first-child{grid-column:span 2}.gal.g6{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr}.gal.g7,.gal.g8,.gal.g9{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr}.gal.g7 .gi:first-child,.gal.g8 .gi:first-child{grid-column:span 2}
.gal .gi{overflow:hidden;position:relative}.gal .gi img{width:100%;height:100%;object-fit:cover;min-height:100px;transition:transform .5s var(--ease)}.gal .gi:hover img{transform:scale(1.04)}
.pc{padding:.9rem 1.1rem}.pc-text{font-size:.88rem;line-height:1.8;color:var(--text);word-wrap:break-word;white-space:pre-wrap}
.pc-tags{margin-top:.55rem;display:flex;flex-wrap:wrap;gap:.3rem}
.pc-tag{font-size:.6rem;padding:.15rem .5rem;border-radius:100px;background:rgba(139,124,247,.08);color:var(--accent2);transition:background .2s}.pc-tag:hover{background:rgba(139,124,247,.15)}
.sbar{display:flex;align-items:center;padding:.4rem 1.1rem;border-top:1px solid var(--bd);gap:.1rem}
.sb{display:flex;align-items:center;gap:.25rem;padding:.3rem .5rem;border-radius:100px;background:none;border:none;color:var(--muted);font-size:.72rem;cursor:pointer;transition:all .25s var(--ease);font-family:inherit}
.sb svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.5;transition:all .25s}
.sb:hover{background:rgba(255,255,255,.03);color:var(--dim)}
.sb.liked{color:var(--like)}.sb.liked svg{fill:var(--like);stroke:var(--like)}.sb.saved{color:var(--save)}.sb.saved svg{fill:var(--save);stroke:var(--save)}.sb-sp{flex:1}
.cmt-sec{padding:0 1.1rem .75rem;display:none;border-top:1px solid var(--bd)}.cmt-sec.open{display:block}
.cmt{display:flex;gap:.5rem;padding:.4rem 0}
.cmt-av{width:24px;height:24px;border-radius:50%;background:var(--bg2);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--dim);flex-shrink:0}
.cmt-b{flex:1}.cmt-top{display:flex;align-items:baseline;gap:.35rem}
.cmt-name{font-size:.68rem;color:var(--dim);font-weight:500}.cmt-time{font-size:.55rem;color:var(--faint)}
.cmt-txt{font-size:.78rem;color:var(--text2);line-height:1.5;margin-top:.1rem}
.cmt-form{display:flex;gap:.4rem;align-items:center;padding-top:.5rem;border-top:1px solid var(--bd);margin-top:.4rem}
.cmt-nick{width:65px;background:var(--bg2);border:1px solid var(--bd);border-radius:100px;padding:.35rem .55rem;color:var(--text);font-size:.7rem;outline:none;font-family:inherit;flex-shrink:0}.cmt-nick:focus{border-color:var(--accent)}
.cmt-inp{flex:1;background:var(--bg2);border:1px solid var(--bd);border-radius:100px;padding:.35rem .7rem;color:var(--text);font-size:.75rem;outline:none;font-family:inherit}.cmt-inp:focus{border-color:var(--accent)}
.cmt-go{width:26px;height:26px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}.cmt-go svg{width:11px;height:11px;fill:currentColor}

/* PUBLISH */
.pbar{position:fixed;bottom:1.1rem;left:50%;transform:translateX(-50%);z-index:90;display:none;animation:bin .5s var(--ease)}
@keyframes bin{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.pbar-in{display:flex;align-items:center;gap:.3rem;padding:.35rem .4rem .35rem .8rem;background:rgba(10,10,28,.9);backdrop-filter:blur(24px);border:1px solid var(--bd2);border-radius:100px;box-shadow:0 6px 30px rgba(0,0,0,.5)}
.pbar input[type=text]{background:none;border:none;color:var(--text);padding:.3rem .35rem;font-size:.8rem;width:180px;outline:none;font-family:inherit}.pbar input::placeholder{color:var(--faint)}
.pib{width:32px;height:32px;border-radius:50%;border:1px solid var(--bd2);background:none;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s var(--ease);flex-shrink:0;position:relative}
.pib:hover{border-color:var(--accent);color:var(--accent)}.pib svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5}
.pib .badge{position:absolute;top:-2px;right:-2px;min-width:13px;height:13px;border-radius:7px;background:var(--accent);color:#fff;font-size:.5rem;display:flex;align-items:center;justify-content:center;padding:0 3px;font-weight:600}
.psend{width:32px;height:32px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s var(--ease);flex-shrink:0}
.psend:hover{box-shadow:0 0 16px var(--accent-g);transform:scale(1.05)}.psend:disabled{opacity:.25;cursor:not-allowed;transform:none;box-shadow:none}.psend svg{width:14px;height:14px;fill:currentColor}
.pbar-pv{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);display:flex;gap:3px;background:rgba(10,10,28,.9);backdrop-filter:blur(16px);border:1px solid var(--bd2);border-radius:8px;padding:4px;max-width:340px;overflow-x:auto}.pbar-pv:empty{display:none}
.pbar-pv .pvt{position:relative;width:44px;height:44px;border-radius:5px;overflow:hidden;border:1px solid var(--bd);flex-shrink:0}
.pbar-pv .pvt img,.pbar-pv .pvt video{width:100%;height:100%;object-fit:cover}
.pbar-pv .pvt .pvx{position:absolute;top:1px;right:1px;width:13px;height:13px;border-radius:50%;background:rgba(0,0,0,.75);border:none;color:#fff;font-size:.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* FULL PUBLISH */
.fov{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s}.fov.active{opacity:1;pointer-events:all}
.fov-bg{position:absolute;inset:0;background:rgba(6,6,17,.88);backdrop-filter:blur(28px)}
.fov-m{position:relative;width:92%;max-width:520px;max-height:90vh;overflow-y:auto;background:var(--bg3);border:1px solid var(--bd2);border-radius:16px;padding:1.8rem 1.5rem;transform:translateY(20px) scale(.97);transition:transform .5s var(--ease);z-index:1}.fov.active .fov-m{transform:translateY(0) scale(1)}
.fm-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.fm-h h2{font-size:.95rem;font-weight:400;color:var(--text2);display:flex;align-items:center;gap:.35rem}.fm-h .hd{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.fm-x{width:30px;height:30px;border-radius:50%;border:1px solid var(--bd2);background:none;color:var(--dim);font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s var(--ease)}.fm-x:hover{background:#ef4444;color:#fff;border-color:#ef4444}
.fm-ta{width:100%;min-height:100px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rs);padding:.8rem .9rem;color:var(--text);font-family:inherit;font-size:.85rem;line-height:1.65;resize:vertical;outline:none;transition:border-color .3s}.fm-ta:focus{border-color:var(--accent)}
.fm-tags{margin-top:.5rem;display:flex;gap:.35rem;align-items:center}.fm-tags label{font-size:.68rem;color:var(--muted);flex-shrink:0}.fm-tags input{flex:1;background:var(--bg2);border:1px solid var(--bd);border-radius:100px;padding:.3rem .65rem;color:var(--text);font-size:.72rem;outline:none;font-family:inherit}.fm-tags input:focus{border-color:var(--accent)}
.dz{margin-top:.7rem;border:1.5px dashed var(--bd2);border-radius:var(--rs);padding:1.1rem;text-align:center;cursor:pointer;transition:all .3s var(--ease)}.dz:hover,.dz.dov{border-color:var(--accent);background:rgba(139,124,247,.03)}
.dz svg{width:22px;height:22px;stroke:var(--muted);fill:none;stroke-width:1.2;margin-bottom:.15rem;transition:stroke .3s}.dz:hover svg{stroke:var(--accent)}.dz p{font-size:.7rem;color:var(--muted)}
.dz-b{display:flex;gap:.4rem;margin-top:.35rem;justify-content:center}
.dz-btn{padding:.2rem .6rem;border-radius:100px;border:1px solid var(--bd2);background:none;color:var(--dim);font-size:.62rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:.2rem}.dz-btn:hover{border-color:var(--accent);color:var(--accent)}.dz-btn svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:1.5}
.fpv{margin-top:.5rem;display:flex;flex-wrap:wrap;gap:.3rem}
.fpv .pvt{position:relative;width:50px;height:50px;border-radius:var(--rs);overflow:hidden;border:1px solid var(--bd)}.fpv .pvt img,.fpv .pvt video{width:100%;height:100%;object-fit:cover}
.fpv .pvt .pvx{position:absolute;top:2px;right:2px;width:14px;height:14px;border-radius:50%;background:rgba(0,0,0,.7);border:none;color:#fff;font-size:.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.fm-ft{margin-top:.9rem;display:flex;justify-content:space-between;align-items:center}.fm-ft .hint{font-size:.65rem;color:var(--faint)}
.fm-go{padding:.5rem 1.3rem;border-radius:100px;border:none;background:var(--accent);color:#fff;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .3s var(--ease)}.fm-go:hover{box-shadow:0 4px 18px var(--accent-g);transform:translateY(-1px)}.fm-go:disabled{opacity:.25;cursor:not-allowed;transform:none;box-shadow:none}

/* PASSWORD */
.pwd{position:fixed;inset:0;z-index:250;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s}.pwd.active{opacity:1;pointer-events:all}
.pwd-bg{position:absolute;inset:0;background:rgba(6,6,17,.88);backdrop-filter:blur(28px)}
.pwd-box{position:relative;width:88%;max-width:320px;background:var(--bg3);border:1px solid var(--bd2);border-radius:16px;padding:1.8rem 1.5rem;text-align:center;z-index:1;transform:translateY(18px) scale(.97);transition:transform .5s var(--ease)}.pwd.active .pwd-box{transform:translateY(0) scale(1)}
.pwd-box h3{font-size:.95rem;font-weight:400;color:var(--text2);margin-bottom:.4rem}.pwd-box p{font-size:.72rem;color:var(--faint);margin-bottom:1rem}
.pwd-inp{width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:100px;padding:.5rem .9rem;color:var(--text);font-size:.85rem;outline:none;font-family:inherit;text-align:center;letter-spacing:.15em}.pwd-inp:focus{border-color:var(--accent)}.pwd-inp.shake,.cmt-nick.shake{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.pwd-err{font-size:.65rem;color:var(--like);margin-top:.4rem;opacity:0;transition:opacity .3s}.pwd-err.show{opacity:1}
.pwd-btns{display:flex;gap:.5rem;margin-top:1rem;justify-content:center}

/* LIGHTBOX */
.lb{position:fixed;inset:0;background:rgba(6,6,17,.97);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}.lb.active{opacity:1;pointer-events:all}
.lb-media{max-width:92%;max-height:88vh;border-radius:var(--r);object-fit:contain}.lb video{max-width:92%;max-height:88vh;border-radius:var(--r);outline:none}
.lb-x{position:absolute;top:1rem;right:1rem;width:36px;height:36px;border-radius:50%;border:1px solid var(--bd2);background:rgba(255,255,255,.04);backdrop-filter:blur(10px);color:white;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s var(--ease)}.lb-x:hover{background:var(--accent);border-color:var(--accent)}

.toast{position:fixed;bottom:4.5rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg3);border:1px solid var(--bd2);padding:.45rem 1rem;border-radius:100px;font-size:.75rem;color:var(--text2);opacity:0;transition:all .4s var(--ease);z-index:400;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:4rem 1rem}
.eorb{width:80px;height:80px;margin:0 auto 1.2rem;position:relative;animation:sp 25s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
.eorb .ring{position:absolute;inset:0;border:1px solid var(--bd);border-radius:50%}.eorb .edot{position:absolute;width:6px;height:6px;border-radius:50%;background:#c8d0e0;box-shadow:0 0 8px rgba(200,208,224,.25);top:-3px;left:50%;transform:translateX(-50%)}
.eorb .ec{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:7px;height:7px;border-radius:50%;background:var(--dim);opacity:.25}
.empty h3{font-size:1rem;font-weight:300;color:var(--dim);margin-bottom:.3rem}.empty p{font-size:.75rem;color:var(--faint)}
.footer{border-top:1px solid var(--bd);padding:2rem;text-align:center;position:relative;z-index:1;display:none}.footer.on{display:block}.footer p{font-size:.65rem;color:var(--faint)}
.reveal{opacity:0;transform:translateY(15px);transition:all .7s var(--ease)}.reveal.vis{opacity:1;transform:translateY(0)}

@media(max-width:640px){
  .nav{padding:.6rem .8rem}
  .nav-logo{font-size:.72rem}
  .nbtn{padding:.3rem .65rem;font-size:.65rem}
  .nav-pl{padding:.25rem .55rem;font-size:.62rem}
  .main{padding:0 .8rem 6rem}
  .tl{padding-left:22px}.tl::before{left:4px}
  .post-dot{left:-18px}
  .h-title{font-size:clamp(2rem,9vw,4rem)}
  .h-desc{font-size:.78rem}
  .h-cta{flex-direction:column;align-items:center;gap:.5rem}
  .cb{padding:.5rem 1.2rem;font-size:.76rem}
  .hero{height:calc(100vh - env(safe-area-inset-bottom, 0px));padding:0 1rem}
  .h-scr{bottom:calc(1.2rem + env(safe-area-inset-bottom, 0px))}
  .post-card{border-radius:10px}
  .pm img,.pm video{max-height:280px}
  .pc{padding:.7rem .85rem}
  .pc-text{font-size:.82rem;line-height:1.7}
  .sbar{padding:.35rem .85rem;gap:0}
  .sb{padding:.25rem .4rem;font-size:.68rem}
  .sb svg{width:14px;height:14px}
  .sec-h{padding:3rem 0 1rem}
  .sec-t{font-size:1rem}
  .pbar{bottom:calc(.8rem + env(safe-area-inset-bottom, 0px))}
  .pbar input[type=text]{width:110px;font-size:.75rem}
  .pib{width:28px;height:28px}.pib svg{width:12px;height:12px}
  .psend{width:28px;height:28px}.psend svg{width:12px;height:12px}
  .fov-m{width:95%;max-width:none;padding:1.4rem 1.1rem;border-radius:14px}
  .fm-ta{min-height:80px;font-size:.8rem}
  .pwd-box{width:90%;padding:1.5rem 1.2rem}
  .lb-media{max-width:96%;max-height:85vh;border-radius:10px}
  .lb video{max-width:96%;max-height:85vh}
  .lb-x{top:.6rem;right:.6rem;width:32px;height:32px}
  .pnav{bottom:calc(.8rem + env(safe-area-inset-bottom, 0px));padding:.3rem .4rem;border-radius:12px}
  .pnav-btn{padding:.25rem .35rem;min-width:32px}
  .pnav-btn .pnav-e{font-size:.75rem}
  .pnav-btn .pnav-n{font-size:.42rem}
  .pi-box{padding:.5rem .75rem;border-radius:8px}
  .pi-n{font-size:.82rem}.pi-d{font-size:.56rem}
  .toast{bottom:calc(3.5rem + env(safe-area-inset-bottom, 0px));font-size:.7rem}
  .footer{padding:1.5rem .8rem}.footer p{font-size:.6rem}
  .esub button{width:28px;height:28px;font-size:.8rem}
  .intro-txt{font-size:.8rem;bottom:10%;letter-spacing:.4em}
  .qcard{padding:1rem 1.1rem}
  .qtxt{font-size:.82rem;line-height:1.7}
  .gal .gi img{min-height:80px}
  .cmt-form{flex-wrap:wrap;gap:.3rem}
  .cmt-nick{width:55px;font-size:.65rem;padding:.3rem .45rem}
  .cmt-inp{font-size:.7rem;padding:.3rem .6rem}
}
@media(max-width:380px){
  .h-title{font-size:clamp(1.6rem,8vw,2.8rem)}
  .nav-r{gap:.3rem}
  .pbar-in{gap:.2rem;padding:.3rem .3rem .3rem .6rem}
  .pbar input[type=text]{width:85px}
}
</style>
</head>
<body>
<div class="intro" id="intro"><canvas id="introC"></canvas><div class="intro-txt" id="iTxt">启航，飞向星辰</div></div>

<nav class="nav" id="nav"><div class="nav-l"><button class="back-btn" id="backBtn" onclick="backToSolar()"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>返回</button><div class="nav-logo"><span class="logo-dot"></span><span class="logo-hl">星星</span>的小破站</div></div><div class="nav-r"><div class="nav-pl" id="navPl" onclick="backToSolar()"><span id="npE">🌍</span><span id="npN">地球</span></div><button class="nbtn" id="mBtn" onclick="tryAdmin()" style="display:none">进入管理</button></div></nav>
<section class="hero" id="hero"><div class="h-badge"><span class="bd"></span>宇宙在线</div><h1 class="h-title"><span class="hl">星星</span><span class="rest">的小破站</span></h1><p class="h-desc" id="hDesc">在浩瀚宇宙里，留一颗属于自己的星</p><div class="h-cta"><button class="cb cb-p" onclick="goContent()">探索内容</button><button class="cb cb-g" id="createBtn" onclick="startCreate()" style="display:none">开始创作</button></div><div class="h-scr"><span>Scroll</span><div class="scr-box"><div class="scr-d"></div></div></div></section>

<main class="main" id="mc"><div class="sec-h reveal"><h2 class="sec-t">时间线</h2><span class="sec-c" id="cnt">0 篇</span></div><div class="tl" id="tl"></div><div class="empty reveal" id="emp"><div class="eorb"><div class="ring"></div><div class="edot"></div><div class="ec"></div></div><h3>这片星球还是空的</h3><p>期待更多精彩内容...</p></div></main>
<div class="pbar" id="pbar"><div class="pbar-pv" id="qPv"></div><div class="pbar-in"><input type="text" id="qInp" placeholder="分享你的想法..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();qPost()}"><button class="pib" onclick="$('qImg').click()" title="图片" id="qImgBtn"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></button><button class="pib" onclick="$('qVid').click()" title="视频" id="qVidBtn"><svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></button><button class="pib" onclick="openFull()" title="展开"><svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><button class="psend" id="qSend" onclick="qPost()" disabled><svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button></div><input type="file" id="qImg" accept="image/*" multiple hidden onchange="hQF(event,'image')"><input type="file" id="qVid" accept="video/*" hidden onchange="hQF(event,'video')"></div>
